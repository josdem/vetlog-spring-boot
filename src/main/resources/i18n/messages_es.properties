privacy.title=Aviso de Privacidad
privacy.header=Bienvenidos al aviso de privacidad de Vetlog
privacy.description=Vetlog es una aplicaciﾃｳn web ﾃｳ sitio web, que te permite registrar tus mascotas y su historial mﾃｩdico. Estamos comprometidos a proteger tu privacidad. Esta politica de privacidad explica cﾃｳmo recopilamos, usamos, divulgamos y protegemos tu informaciﾃｳn cuando visitas nuestro sitio web. Por favor, lee esta politica de privacidad cuidadosamente. Si no estﾃ｡s de acuerdo con los tﾃｩrminos de ﾃｩsta politica de privacidad, por favor no accedas al sitio.
privacy.information.title=Informaciﾃｳn que Recopilamos
privacy.information.description=Recopilamos informaciﾃｳn personal que nos proporcionas voluntariamente al registrarte en el sitio web expresando interﾃｩs en obtener informaciﾃｳn sobre nosotros o nuestros servicios, al participar en actividades en el sitio web.
privacy.usage.title=Uso de tu Informaciﾃｳn
privacy.usage.description=Tener informaciﾃｳn precisa sobre ti y tus mascotas nos permite proporcionarte una buena experiencia, eficiente y personalizada. Especificamente, podemos usar la informaciﾃｳn recopilada sobre ti a travﾃｩs del sitio web para:
privacy.usage.list=Crear y administrar tu cuenta y el historial mﾃｩdico de tus mascotas.
privacy.disclosure.title=Divulgaciﾃｳn de tu Informaciﾃｳn
privacy.disclosure.description=No compartiremos ninguna informaciﾃｳn que hayamos recopilado sobre ti o tus mascotas con ninguna entidad de terceros.
privacy.security.title=Seguridad de tu Informaciﾃｳn
privacy.security.description=Usamos autenticaciﾃｳn, autorizaciﾃｳn y filtros para manejar el acceso de los usuarios al sitio web, no conocemos tu contraseﾃｱa, ya que usamos la funciﾃｳn de hash BCrypt para almacenarlas, y otras medidas de seguridad estﾃ｡ndar para ayudar a proteger tu informaciﾃｳn personal. Por la presente declaramos, segﾃｺn nuestro leal saber y entender, que tu informaciﾃｳn estﾃ｡ segura. Si encuentras alguna vulnerabilidad de seguridad que haya sido causada inadvertidamente por nosotros, o tienes alguna pregunta sobre cﾃｳmo el sitio web protege tu privacidad, por favor contﾃ｡ctanos en vetlog@josdem.io y con gusto te apoyamos.