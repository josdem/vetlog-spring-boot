privacy.title=Aviso de Privacidad
privacy.header=Bienvenidos al aviso de privacidad de Vetlog
privacy.description=Vetlog es una aplicaciĂłn web Ăł sitio web, que te permite registrar tus mascotas y su historial mĂŠdico. Estamos comprometidos a proteger tu privacidad. Esta politica de privacidad explica cĂłmo recopilamos, usamos, divulgamos y protegemos tu informaciĂłn cuando visitas nuestro sitio web. Por favor, lee esta politica de privacidad cuidadosamente. Si no estĂĄs de acuerdo con los tĂŠrminos de ĂŠsta politica de privacidad, por favor no accedas al sitio.
privacy.information.title=InformaciĂłn que Recopilamos
privacy.information.description=Recopilamos informaciĂłn personal que nos proporcionas voluntariamente al registrarte en el sitio web expresando interĂŠs en obtener informaciĂłn sobre nosotros o nuestros servicios, al participar en actividades en el sitio web.
privacy.usage.title=Uso de tu InformaciĂłn
privacy.usage.description=Tener informaciĂłn precisa sobre ti y tus mascotas nos permite proporcionarte una buena experiencia, eficiente y personalizada. Especificamente, podemos usar la informaciĂłn recopilada sobre ti a travĂŠs del sitio web para:
privacy.usage.list=Crear y administrar tu cuenta y el historial mĂŠdico de tus mascotas.
privacy.disclosure.title=DivulgaciĂłn de tu InformaciĂłn
privacy.disclosure.description=No compartiremos ninguna informaciĂłn que hayamos recopilado sobre ti o tus mascotas con ninguna entidad de terceros.
privacy.security.title=Seguridad de tu InformaciĂłn
privacy.security.description=Usamos autenticaciĂłn, autorizaciĂłn y filtros para manejar el acceso de los usuarios al sitio web, no conocemos tu contraseĂąa, ya que usamos la funciĂłn de hash BCrypt para almacenarlas, y otras medidas de seguridad estĂĄndar para ayudar a proteger tu informaciĂłn personal. Por la presente declaramos, segĂşn nuestro leal saber y entender, que tu informaciĂłn estĂĄ segura. Si encuentras alguna vulnerabilidad de seguridad que haya sido causada inadvertidamente por nosotros, o tienes alguna pregunta sobre cĂłmo el sitio web protege tu privacidad, por favor contĂĄctanos en vetlog@josdem.io y con gusto te apoyamos.
